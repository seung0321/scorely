<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="420" rx="16" fill="url(#bg)"/>
  <rect width="840" height="420" rx="16" stroke="#E5E7EB" stroke-width="1" fill="none"/>

  <!-- Logo icon -->
  <rect x="340" y="36" width="40" height="40" rx="10" fill="url(#accent)"/>
  <rect x="349" y="53" width="4" height="14" rx="1" fill="white" opacity="0.5"/>
  <rect x="356" y="47" width="4" height="20" rx="1" fill="white" opacity="0.75"/>
  <rect x="363" y="41" width="4" height="26" rx="1" fill="white"/>

  <!-- Logo text -->
  <text x="390" y="66" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="30" font-weight="700" fill="#2563EB" letter-spacing="-0.5">scorely</text>

  <!-- Tagline -->
  <text x="420" y="98" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">AI 기반 이력서 분석 및 점수화 서비스</text>

  <!-- Tech badges -->
  <rect x="196" y="116" width="72" height="24" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="232" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="500">Next.js 14</text>

  <rect x="278" y="116" width="58" height="24" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.5"/>
  <text x="307" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#1D4ED8" text-anchor="middle" font-weight="500">Fastify</text>

  <rect x="346" y="116" width="74" height="24" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="383" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#15803D" text-anchor="middle" font-weight="500">Gemini AI</text>

  <rect x="430" y="116" width="56" height="24" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="458" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle" font-weight="500">Prisma</text>

  <rect x="496" y="116" width="66" height="24" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="529" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle" font-weight="500">TypeScript</text>

  <rect x="572" y="116" width="80" height="24" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="612" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle" font-weight="500">pnpm mono</text>

  <!-- Divider -->
  <line x1="60" y1="160" x2="780" y2="160" stroke="#E5E7EB" stroke-width="0.5"/>

  <!-- Feature cards -->
  <!-- Card 1 -->
  <rect x="60" y="178" width="228" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <rect x="76" y="194" width="32" height="32" rx="8" fill="#EFF6FF"/>
  <path d="M88 202l1.5 4h4.5l-3.5 2.5 1.5 4.5-4-3.5-4 3.5 1.5-4.5-3.5-2.5h4.5z" fill="#2563EB"/>
  <text x="76" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#111827" font-weight="600">AI 종합 점수</text>
  <text x="76" y="266" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">5개 항목 100점 만점 분석</text>

  <!-- Card 2 -->
  <rect x="306" y="178" width="228" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <rect x="322" y="194" width="32" height="32" rx="8" fill="#F0FDF4"/>
  <path d="M332 210l3.5 4 6.5-8" stroke="#15803D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="322" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#111827" font-weight="600">강점 &amp; 개선사항</text>
  <text x="322" y="266" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">구체적 피드백과 AI 추천 텍스트</text>

  <!-- Card 3 -->
  <rect x="552" y="178" width="228" height="100" rx="12" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <rect x="568" y="194" width="32" height="32" rx="8" fill="#FFF7ED"/>
  <circle cx="584" cy="210" r="5" stroke="#C2410C" stroke-width="1.5" fill="none"/>
  <path d="M584 206v4" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="584" cy="213" r="0.75" fill="#C2410C"/>
  <text x="568" y="248" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#111827" font-weight="600">버전 이력 관리</text>
  <text x="568" y="266" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">수정마다 점수 변화를 버전별 추적</text>

  <!-- Score preview panel -->
  <rect x="60" y="296" width="720" height="108" rx="12" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>

