  <text x="80" y="322" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#111827" font-weight="500">분석 결과 미리보기</text>
  <rect x="680" y="308" width="80" height="22" rx="11" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="720" y="323" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">IT개발·데이터</text>

  <!-- Total score -->
  <text x="86" y="346" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#9CA3AF">종합점수</text>
  <text x="80" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="32" fill="#2563EB" font-weight="700">81</text>
  <text x="120" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#9CA3AF">/ 100</text>

  <!-- Score bars -->
  <!-- 전문성 70 -->
  <text x="180" y="345" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">전문성</text>
  <rect x="230" y="336" width="380" height="5" rx="2.5" fill="#F3F4F6"/>
  <rect x="230" y="336" width="266" height="5" rx="2.5" fill="#2563EB"/>
  <text x="620" y="345" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">70</text>

  <!-- 실무경험 80 -->
  <text x="180" y="361" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">실무경험</text>
  <rect x="230" y="352" width="380" height="5" rx="2.5" fill="#F3F4F6"/>
  <rect x="230" y="352" width="304" height="5" rx="2.5" fill="#2563EB"/>
  <text x="620" y="361" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">80</text>

  <!-- 성과 70 -->
  <text x="180" y="377" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">성과</text>
  <rect x="230" y="368" width="380" height="5" rx="2.5" fill="#F3F4F6"/>
  <rect x="230" y="368" width="266" height="5" rx="2.5" fill="#2563EB"/>
  <text x="620" y="377" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">70</text>

  <!-- 협업 85 -->
  <text x="180" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">협업</text>
  <rect x="230" y="384" width="380" height="5" rx="2.5" fill="#F3F4F6"/>
  <rect x="230" y="384" width="323" height="5" rx="2.5" fill="#2563EB"/>
  <text x="620" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#6B7280">85</text>

  <!-- Feedback tags -->
  <rect x="650" y="340" width="116" height="24" rx="6" fill="#F0FDF4"/>
  <text x="708" y="356" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#15803D" text-anchor="middle">성과 수치화 우수</text>

  <rect x="650" y="372" width="116" height="24" rx="6" fill="#FFFBEB"/>
  <text x="708" y="388" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#92400E" text-anchor="middle">협업 경험 보완 필요</text>
</svg>
